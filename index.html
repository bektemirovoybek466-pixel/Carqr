<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>CarQR</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:url("bg.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;

font-family:Arial, sans-serif;
}

/* karta */
.card{
background:rgba(255,255,255,0.9);
padding:60px;
border-radius:25px;
text-align:center;
width:420px;
box-shadow:0 15px 50px rgba(0,0,0,0.6);
}

/* sarlavha */
h1{
font-size:36px;
margin-bottom:25px;
}

/* matn */
p{
font-size:20px;
margin:15px 0;
}

/* tugma */
button{
margin-top:30px;
padding:18px 35px;
font-size:22px;
border:none;
border-radius:14px;
background:#ff5a36;
color:white;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e24726;
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="card">
